<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DK-VISION - Connexion</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo" style="text-decoration:none">
                <h1>DK-VISION</h1>
                <span class="tagline">Photographie</span>
            </a>
            <nav>
                <a href="/">Accueil</a>
                <a href="/galleries">Galeries</a>
                <a href="/contact">Contact</a>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Mode sombre">🌙</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="form-container reveal" style="max-width:420px">
            <h2 style="text-align:center;margin-bottom:1.5rem">Connexion Admin</h2>

            <div class="error-message" th:if="${param.error != null}">
                <p>Identifiants incorrects</p>
            </div>
            <div class="success-message" th:if="${param.logout != null}">
                <p>Vous êtes déconnecté</p>
            </div>

            <form th:action="@{/login}" method="post" class="styled-form">
                <div class="form-group">
                    <label for="username">Identifiant</label>
                    <input type="text" id="username" name="username" placeholder="admin" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="Mot de passe" required>
                </div>

                <div class="form-actions" style="flex-direction:column">
                    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Se connecter</button>
                    <a href="/" class="btn btn-secondary" style="width:100%;justify-content:center">← Retour à l'accueil</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-contact">
                <a href="https://wa.me/221774844340" target="_blank" class="whatsapp-link">&#128242; +221 77 484 43 40</a>
                <a href="https://wa.me/221786754171" target="_blank" class="whatsapp-link">&#128242; +221 78 675 41 71</a>
            </div>
            <p>&copy; <span th:text="${#temporals.year(#temporals.createNow())}">2026</span> DK-VISION. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        function toggleTheme() {
            var html = document.documentElement;
            var current = html.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('dkvision-theme', next);
            document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
        }
        (function() {
            var saved = localStorage.getItem('dkvision-theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
            if (saved === 'dark') document.querySelector('.theme-toggle').textContent = '☀️';
        })();
    </script>
</body>
</html>
