# Production profile for Cloud Run

# H2 in-memory (for demo — data resets on restart)
# Replace with Cloud SQL MySQL for persistence
spring.datasource.url=jdbc:h2:mem:dkvision
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Admin credentials
app.admin.username=admin
app.admin.password=dkvision2026

# Upload directory
app.upload.dir=/tmp/uploads
